<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BioKinetiX</title>
  <script>
    //window.location.replace('pages/home.html');
  </script>
</head>
<body>
  <header id="header"></header>
  <div id="app"></div>
  <footer id="footer"></footer>

  <script type="module">
    import Header from './components/header.js';
    import Footer from './components/footer.js';
    import Home from './pages/home.js';
    import About from './pages/about.js';
    import { page_titles } from './data/data.js';

    const routes = {
      home: Home,
      about: About,
    };

    function getRoute() {
      const path = window.location.pathname.replace('/', '');

      //console.log("PathName: ", window.location.pathname)
      //console.log("Path: ", path)

      return routes[path] ? path : 'home';
    }

    function render() {
      const route = getRoute();
      document.getElementById('header').innerHTML = Header(route);
      document.getElementById('footer').innerHTML = Footer();

      // Check element import
      console.log(Footer())

      document.getElementById('app').innerHTML = routes[route]();
      document.title = page_titles[route] || 'BioKinetiX';
    }

    function handleNavClick(event) {
      if (event.target.tagName !== 'A') return;
      const href = event.target.getAttribute('href');
      if (!href || !href.startsWith('/') || href.startsWith('//')) return;
      event.preventDefault();
      window.history.pushState({}, '', href);
      render();
    }

    window.addEventListener('popstate', render);
    document.body.addEventListener('click', handleNavClick);
    render();
  </script>
</body>
</html>
