<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <base href="/biokinetix/">
  <title>BioKinetiX</title>
  <script>
    //window.location.replace('pages/home.html');
  </script>
</head>
<body>
  <header id="header"></header>
  <div id="app"></div>
  <footer id="footer"></footer>

  <script type="module">
    import Header from './components/header.js';
    import Footer from './components/footer.js';
    import Home from './pages/home.js';
    import About from './pages/about.js';
    import { page_titles } from './data/data.js';

    const routes = {
      home: Home,
      about: About,
    };

    function getRoute() {
      const trimmed = window.location.pathname.replace(/^\/|\/$/g, '');
      const route = trimmed.split('/').pop();
      return routes[route] ? route : 'home';
    }

    function render() {
      const route = getRoute();
      document.getElementById('header').innerHTML = Header(route);
      document.getElementById('footer').innerHTML = Footer();
      document.getElementById('app').innerHTML = routes[route]();
      document.title = page_titles[route] || 'BioKinetiX';
    }

    function handleNavClick(event) {
      const anchor = event.target.closest('a');
      if (!anchor) return;
      const href = anchor.getAttribute('href');
      if (!href) return;
      const targetUrl = new URL(href, window.location.href);
      if (targetUrl.origin !== window.location.origin) return;
      const route = targetUrl.pathname.replace(/^\/|\/$/g, '').split('/').pop();
      if (!routes[route]) return;
      event.preventDefault();
      window.history.pushState({}, '', targetUrl.pathname);
      render();
    }

    window.addEventListener('popstate', render);
    document.body.addEventListener('click', handleNavClick);
    render();
  </script>
</body>
</html>
